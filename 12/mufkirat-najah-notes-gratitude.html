<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملاحظات وشكر - مفكرة النجاح</title>
<style>
:root{
  --primary:#05AD98; --primary-light:#2BCFCE; --deep:#245F73;
  --accent:#EC4D25; --gray:#878787; --gray-light:#BBBFBF;
  --bg:#FAFAFA; --white:#FFFFFF; --text:#1A2E2C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Alyamama','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-font-smoothing:antialiased;}
.amiri{font-family:'Amiri','Segoe UI',serif;}
.screen{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary);cursor:pointer;flex-shrink:0;}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--deep);flex:1;}
.topbar-icon{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;}

/* ══ TOGGLE TABS ══ */
.tabs-wrap{display:flex;gap:8px;margin:10px 18px 18px;background:#fff;border-radius:16px;padding:5px;box-shadow:0 2px 10px rgba(5,173,152,.06);}
.tab-btn{flex:1;text-align:center;padding:10px 0;border-radius:12px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;color:var(--gray);transition:all .25s;}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(5,173,152,.3);}
.tab-btn.active.grat-active{background:linear-gradient(135deg,#F5B544,var(--accent));box-shadow:0 4px 12px rgba(236,77,37,.3);}

.section{display:none;}
.section.active{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ══ NOTES ══ */
.note-add-card{background:#fff;border-radius:22px;padding:18px;margin:0 18px 18px;box-shadow:0 4px 18px rgba(5,173,152,.07);}
.note-textarea{
  width:100%;border:1.5px solid rgba(5,173,152,.15);border-radius:14px;padding:13px 16px;
  font-family:inherit;font-size:.88rem;outline:none;resize:none;transition:border-color .2s;
  background:rgba(5,173,152,.02);
}
.note-textarea:focus{border-color:var(--primary);}
.note-add-btn{
  width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;
  font-weight:800;font-size:.86rem;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 18px rgba(5,173,152,.28);transition:transform .2s;
}
.note-add-btn:active{transform:scale(.97);}

.notes-count-row{display:flex;align-items:center;justify-content:space-between;margin:0 18px 12px;}
.notes-count-label{font-size:.84rem;font-weight:800;color:var(--deep);}
.notes-count-badge{font-size:.74rem;font-weight:800;color:var(--primary);background:rgba(5,173,152,.08);padding:4px 12px;border-radius:12px;}

.note-card{
  margin:0 18px 12px;background:linear-gradient(160deg,#fff,rgba(5,173,152,.03));
  border-radius:18px;padding:16px 18px;box-shadow:0 3px 14px rgba(5,173,152,.06);
  position:relative;border-right:3px solid var(--primary-light);
}
.note-text{font-size:.86rem;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.note-date{font-size:.68rem;color:var(--gray);margin-top:8px;display:flex;align-items:center;gap:4px;}
.note-del{position:absolute;top:12px;left:12px;background:none;border:none;cursor:pointer;color:var(--gray-light);font-size:.85rem;padding:4px;border-radius:8px;transition:all .2s;}
.note-del:hover{color:var(--accent);background:rgba(236,77,37,.08);}

.empty-state{text-align:center;padding:40px 20px;color:var(--gray-light);font-size:.84rem;}

/* ══ GRATITUDE ══ */
.grat-hero{
  margin:0 18px 18px;border-radius:24px;padding:22px;text-align:center;
  background:linear-gradient(150deg,#FDF6E8 0%,#FFF9EE 100%);
  border:1px solid rgba(245,181,68,.25);
}
.grat-icon{font-size:2.2rem;}
.grat-title{font-size:1rem;font-weight:800;color:#92660d;margin-top:6px;}
.grat-sub{font-size:.78rem;color:#b9870f;margin-top:3px;}
.grat-slots{display:flex;gap:8px;justify-content:center;margin-top:16px;}
.grat-slot{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;border:2px solid rgba(245,181,68,.3);color:#b9870f;
}
.grat-slot.filled{background:linear-gradient(135deg,#F5B544,var(--accent));color:#fff;border-color:transparent;}

.grat-add-card{background:#fff;border-radius:20px;padding:16px;margin:0 18px 18px;box-shadow:0 4px 18px rgba(245,181,68,.1);}
.grat-input-row{display:flex;gap:8px;}
.grat-input{flex:1;border:1.5px solid rgba(245,181,68,.25);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:.86rem;outline:none;}
.grat-input:focus{border-color:#F5B544;}
.grat-add-btn{
  background:linear-gradient(135deg,#F5B544,var(--accent));color:#fff;border:none;border-radius:12px;
  padding:0 18px;font-weight:800;cursor:pointer;font-size:1.1rem;
}
.grat-full-msg{text-align:center;font-size:.78rem;color:#b9870f;margin-top:10px;font-weight:700;}

.grat-item{
  margin:0 18px 10px;background:#fff;border-radius:16px;padding:13px 16px;
  display:flex;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(245,181,68,.08);
  border-right:3px solid #F5B544;
}
.grat-num{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#F5B544,var(--accent));color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;
}
.grat-item-text{flex:1;font-size:.86rem;color:var(--text);}
.grat-item-del{background:none;border:none;cursor:pointer;color:var(--gray-light);font-size:.9rem;}

.quran-suggest{
  margin:0 18px 18px;padding:14px 16px;border-radius:16px;
  background:rgba(5,173,152,.06);border:1px dashed rgba(5,173,152,.3);
  display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--deep);
}
.quran-suggest button{
  background:var(--primary);color:#fff;border:none;border-radius:10px;padding:6px 12px;
  font-size:.72rem;font-weight:800;cursor:pointer;flex-shrink:0;font-family:inherit;
}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:#fff;padding:11px 22px;border-radius:14px;font-size:.84rem;font-weight:700;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.18);max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cf{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(5,173,152,.10);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(5,173,152,.08);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;flex:1;}
.nav-item.active{color:var(--primary);}
.nav-item .nav-ic{font-size:1.25rem;}
.nav-item span:last-child{font-size:.66rem;font-weight:700;}
.nav-item.active .nav-ic{background:rgba(5,173,152,.10);border-radius:12px;padding:2px 10px;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="screen">

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="topbar-title">ملاحظات وشكر اليوم</div>
    <div class="topbar-icon">⋯</div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <button class="tab-btn active" id="tabNotes" onclick="switchTab('notes')">📝 ملاحظات سريعة</button>
    <button class="tab-btn" id="tabGrat" onclick="switchTab('grat')">🙏 شكر اليوم</button>
  </div>

  <!-- NOTES SECTION -->
  <div class="section active" id="sec-notes">
    <div class="note-add-card">
      <textarea class="note-textarea" id="noteInput" rows="3" placeholder="اكتب فكرتك أو ملاحظتك هنا..."></textarea>
      <button class="note-add-btn" onclick="addNote()">📌 إضافة ملاحظة</button>
    </div>

    <div class="notes-count-row">
      <span class="notes-count-label">ملاحظاتك المحفوظة</span>
      <span class="notes-count-badge" id="notesCount">0 ملاحظة</span>
    </div>

    <div id="notesList"></div>
  </div>

  <!-- GRATITUDE SECTION -->
  <div class="section" id="sec-grat">
    <div class="grat-hero">
      <div class="grat-icon">🙏</div>
      <div class="grat-title">شكر اليوم</div>
      <div class="grat-sub">٣ أشياء تستحق الشكر يومياً</div>
      <div class="grat-slots" id="gratSlots"></div>
    </div>

    <div class="grat-add-card" id="gratAddCard">
      <div class="grat-input-row">
        <input type="text" class="grat-input" id="gratInput" placeholder="أنا شاكر على...">
        <button class="grat-add-btn" onclick="addGrat()">+</button>
      </div>
      <div class="grat-full-msg" id="gratFullMsg" style="display:none;">✨ أحسنت! اكتملت ٣ لحظات شكر لهذا اليوم</div>
    </div>

    <div class="quran-suggest" id="quranSuggest" style="display:none;">
      <span>📖</span>
      <span style="flex:1;">ختمت جزءاً جديداً اليوم؟ أضف شكرك عليه بضغطة</span>
      <button onclick="addQuranGrat()">إضافة</button>
    </div>

    <div id="gratList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-ic">☰</span><span>المزيد</span></div>
  <div class="nav-item"><span class="nav-ic">📊</span><span>التحليلات</span></div>
  <div class="nav-item"><span class="nav-ic">🔄</span><span>العادات</span></div>
  <div class="nav-item"><span class="nav-ic">🎯</span><span>الأهداف</span></div>
  <div class="nav-item active"><span class="nav-ic">🏠</span><span>الرئيسية</span></div>
</div>

<script>
let notes = [
  {text:'فكرة: أطبّق برنامج "خمس دقائق يومياً" — أتعلم مهارة جديدة بخمس دقائق فقط كل يوم، بداية صغيرة تصنع فرقاً كبيراً مع الوقت', date:'اليوم، 9:30 ص'},
  {text:'فكرة: أبدأ "صندوق الخير الأسبوعي" — مبلغ بسيط ثابت كل أسبوع لصدقة أو مساعدة محتاج، بدون انتظار فرصة مثالية أو مبلغ كبير', date:'اليوم، 11:10 ص'},
  {text:'لا أنسى أتصل بصديقي المحزم سعود، طال غيابه', date:'أمس، 4:15 م'},
];
let gratitudes = ['نعمة الصحة والعافية', 'وجود أسرتي بجانبي'];

function switchTab(tab){
  document.getElementById('tabNotes').classList.toggle('active', tab==='notes');
  document.getElementById('tabGrat').classList.toggle('active', tab==='grat');
  document.getElementById('tabGrat').classList.toggle('grat-active', tab==='grat');
  document.getElementById('sec-notes').classList.toggle('active', tab==='notes');
  document.getElementById('sec-grat').classList.toggle('active', tab==='grat');
}

// ══ NOTES ══
function renderNotes(){
  document.getElementById('notesCount').textContent = notes.length+' ملاحظة';
  const wrap = document.getElementById('notesList');
  if(!notes.length){
    wrap.innerHTML = '<div class="empty-state">📭 لا توجد ملاحظات بعد<br>اكتب أول فكرة تخطر ببالك</div>';
    return;
  }
  wrap.innerHTML = notes.map((n,i)=>`
    <div class="note-card">
      <button class="note-del" onclick="delNote(${i})">✕</button>
      <div class="note-text">${n.text}</div>
      <div class="note-date">📅 ${n.date}</div>
    </div>`).join('');
}
function addNote(){
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if(!text){ showToast('⚠️ اكتب ملاحظتك أولاً'); return; }
  notes.unshift({text, date:'الآن'});
  input.value='';
  renderNotes();
  showToast('📝 تمت إضافة الملاحظة! +5 XP');
}
function delNote(i){ notes.splice(i,1); renderNotes(); }

// ══ GRATITUDE ══
function renderGrat(){
  const slotsWrap = document.getElementById('gratSlots');
  slotsWrap.innerHTML='';
  for(let i=0;i<3;i++){
    const filled = i<gratitudes.length;
    slotsWrap.innerHTML += `<div class="grat-slot ${filled?'filled':''}">${filled?'✓':i+1}</div>`;
  }
  const listWrap = document.getElementById('gratList');
  listWrap.innerHTML = gratitudes.map((g,i)=>`
    <div class="grat-item">
      <div class="grat-num">${i+1}</div>
      <span class="grat-item-text">${g}</span>
      <button class="grat-item-del" onclick="delGrat(${i})">✕</button>
    </div>`).join('');

  const full = gratitudes.length>=3;
  document.getElementById('gratAddCard').style.display = full ? 'none' : 'block';
  document.getElementById('gratFullMsg').style.display = full ? 'block' : 'none';
  document.getElementById('quranSuggest').style.display = (!full) ? 'flex' : 'none';
}

function addGrat(){
  const input = document.getElementById('gratInput');
  const text = input.value.trim();
  if(!text){ showToast('⚠️ اكتب ما تشكر عليه'); return; }
  if(gratitudes.length>=3){ showToast('✨ اكتملت ٣ لحظات شكر لليوم'); return; }
  gratitudes.push(text);
  input.value='';
  renderGrat();
  confetti();
  showToast('🙏 شكر مسجل! +5 XP');
  if(gratitudes.length===3){
    setTimeout(()=>showToast('🎉 يوم مليء بالامتنان! أحسنت يا بطل'), 600);
  }
}
function delGrat(i){ gratitudes.splice(i,1); renderGrat(); }
function addQuranGrat(){
  if(gratitudes.length>=3){ showToast('✨ اكتملت ٣ لحظات شكر لليوم'); return; }
  gratitudes.push('أشكر الله على إتمام جزء جديد من القرآن');
  renderGrat();
  confetti();
  showToast('📖 أضيفت لحظة شكر! +5 XP');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2300);
}
function confetti(){
  const cols = ['#F5B544','#EC4D25','#05AD98','#2BCFCE'];
  for(let i=0;i<22;i++){
    const el = document.createElement('div');
    el.className='cf';
    el.style.cssText = `left:${Math.random()*100}vw; top:-10px; background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${1.4+Math.random()*1.6}s; animation-delay:${Math.random()*.3}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderNotes();
  renderGrat();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن والتقويم - مفكرة النجاح</title>
<style>
:root{
  --primary:#05AD98; --primary-light:#2BCFCE; --deep:#245F73;
  --accent:#EC4D25; --gray:#878787; --gray-light:#BBBFBF;
  --bg:#FAFAFA; --white:#FFFFFF; --text:#1A2E2C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Alyamama','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-font-smoothing:antialiased;}
.amiri{font-family:'Amiri','Segoe UI',serif;}
.screen{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary);cursor:pointer;flex-shrink:0;}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--deep);flex:1;}
.topbar-icon{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;}

.tabs-wrap{display:flex;gap:8px;margin:10px 18px 18px;background:#fff;border-radius:16px;padding:5px;box-shadow:0 2px 10px rgba(5,173,152,.06);}
.tab-btn{flex:1;text-align:center;padding:10px 0;border-radius:12px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;color:var(--gray);transition:all .25s;}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(5,173,152,.3);}
.tab-btn.active.cal-active{background:var(--deep);box-shadow:0 4px 12px rgba(36,95,115,.35);}

.section{display:none;}
.section.active{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-block{margin:0 18px 20px;}
.section-head{font-size:.9rem;font-weight:800;color:var(--deep);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ══ QURAN AYAH BANNER ══ */
.ayah-banner{
  border-radius:24px;padding:24px 20px;text-align:center;color:#fff;margin-bottom:20px;
  background:linear-gradient(150deg,#06b9a3 0%,#0a8f80 60%,#066f63 100%);
  position:relative;overflow:hidden;
}
.ayah-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -20%, rgba(255,255,255,.25), transparent 60%);}
.ayah-text{font-family:'Amiri','Segoe UI',serif;font-size:1.2rem;font-weight:700;position:relative;z-index:2;line-height:1.8;}

/* ══ QURAN STATS ══ */
.qstats-row{display:flex;gap:10px;margin-bottom:20px;}
.qstat{flex:1;background:#fff;border-radius:18px;padding:14px 8px;text-align:center;box-shadow:0 4px 16px rgba(5,173,152,.06);}
.qstat-num{font-size:1.5rem;font-weight:800;color:var(--primary);}
.qstat-label{font-size:.66rem;color:var(--gray);font-weight:700;margin-top:2px;}

/* ══ JUZ GRID ══ */
.juz-card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 4px 18px rgba(5,173,152,.07);margin-bottom:18px;}
.juz-legend{display:flex;gap:14px;justify-content:center;margin-bottom:14px;font-size:.7rem;color:var(--gray);}
.juz-legend span{display:flex;align-items:center;gap:5px;}
.leg-dot{width:11px;height:11px;border-radius:4px;display:inline-block;}
.juz-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.juz-cell{
  aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,173,152,.04);border:1.5px solid rgba(5,173,152,.08);cursor:pointer;transition:all .25s;
}
.juz-cell.read{background:linear-gradient(150deg,var(--primary-light),var(--primary));border-color:transparent;color:#fff;}
.juz-cell.mem{background:linear-gradient(150deg,#F5B544,var(--accent));border-color:transparent;color:#fff;}
.juz-num{font-size:1rem;font-weight:800;}
.juz-name{font-size:.52rem;opacity:.85;margin-top:1px;}

/* ══ RECITATION TIME ══ */
.time-card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(5,173,152,.06);margin-bottom:16px;}
.time-row{display:flex;gap:10px;align-items:center;}
.time-input{flex:1;border:1.5px solid rgba(5,173,152,.15);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:.86rem;outline:none;}
.time-input:focus{border-color:var(--primary);}
.time-btn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.82rem;}
.time-week{margin-top:12px;font-size:.78rem;color:var(--gray);text-align:center;}
.time-week strong{color:var(--primary);font-size:1rem;}

/* ══ CALENDAR ══ */
.cal-card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 4px 18px rgba(5,173,152,.07);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;background:rgba(36,95,115,.08);color:var(--deep);border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.cal-month-title{font-size:.94rem;font-weight:800;color:var(--deep);}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.cal-dn{text-align:center;font-size:.62rem;color:var(--gray-light);font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{
  aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;border:1.5px solid rgba(0,0,0,.03);background:#fafafa;
}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day.green{background:rgba(5,173,152,.14);border-color:rgba(5,173,152,.25);color:#066f63;}
.cal-day.yellow{background:rgba(245,181,68,.16);border-color:rgba(245,181,68,.3);color:#92660d;}
.cal-day.red{background:rgba(236,77,37,.10);border-color:rgba(236,77,37,.2);color:#a8341a;}
.cal-day.today{border-color:var(--primary);box-shadow:0 0 0 2px rgba(5,173,152,.12);}
.cal-pct{font-size:.5rem;opacity:.85;}
.cal-legend{display:flex;gap:12px;justify-content:center;margin-top:14px;font-size:.66rem;color:var(--gray);flex-wrap:wrap;}
.cal-legend span{display:flex;align-items:center;gap:4px;}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:#fff;padding:11px 22px;border-radius:14px;font-size:.84rem;font-weight:700;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.18);max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cf{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(5,173,152,.10);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(5,173,152,.08);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;flex:1;}
.nav-item.active{color:var(--primary);}
.nav-item .nav-ic{font-size:1.25rem;}
.nav-item span:last-child{font-size:.66rem;font-weight:700;}
.nav-item.active .nav-ic{background:rgba(5,173,152,.10);border-radius:12px;padding:2px 10px;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="screen">

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="topbar-title">القرآن والتقويم</div>
    <div class="topbar-icon">⋯</div>
  </div>

  <div class="tabs-wrap">
    <button class="tab-btn active" id="tabQuran" onclick="switchTab('quran')">📖 القرآن الكريم</button>
    <button class="tab-btn" id="tabCal" onclick="switchTab('cal')">🗓️ التقويم البصري</button>
  </div>

  <!-- QURAN SECTION -->
  <div class="section active" id="sec-quran">
    <div class="section-block" style="margin-top:10px;">
      <div class="ayah-banner">
        <div class="ayah-text">﴿ اقْرَأْ وَرَبُّكَ الْأَكْرَمُ ﴾</div>
      </div>

      <div class="qstats-row">
        <div class="qstat"><div class="qstat-num" id="qReadNum">5</div><div class="qstat-label">📖 مقروء</div></div>
        <div class="qstat"><div class="qstat-num" id="qMemNum">2</div><div class="qstat-label">⭐ محفوظ</div></div>
        <div class="qstat"><div class="qstat-num" id="qPctNum">23%</div><div class="qstat-label">✅ الإتمام</div></div>
      </div>

      <div class="juz-card">
        <div class="juz-legend">
          <span><span class="leg-dot" style="background:linear-gradient(150deg,#2BCFCE,#05AD98)"></span>مقروء</span>
          <span><span class="leg-dot" style="background:linear-gradient(150deg,#F5B544,#EC4D25)"></span>محفوظ</span>
        </div>
        <div class="juz-grid" id="juzGrid"></div>
      </div>

      <div class="time-card">
        <div class="section-head" style="margin-bottom:10px;">⏱️ وقت التلاوة اليومي</div>
        <div class="time-row">
          <input type="number" class="time-input" id="qMinInput" placeholder="عدد الدقائق اليوم">
          <button class="time-btn" onclick="saveQTime()">حفظ</button>
        </div>
        <div class="time-week">إجمالي هذا الأسبوع: <strong id="qWeekTotal">95</strong> دقيقة</div>
      </div>
    </div>
  </div>

  <!-- CALENDAR SECTION -->
  <div class="section" id="sec-cal">
    <div class="section-block" style="margin-top:10px;">
      <div class="cal-card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(1)">←</button>
          <div class="cal-month-title" id="calTitle">يونيو 2026</div>
          <button class="cal-nav-btn" onclick="changeMonth(-1)">→</button>
        </div>
        <div class="cal-head">
          <div class="cal-dn">أحد</div><div class="cal-dn">اثن</div><div class="cal-dn">ثلا</div>
          <div class="cal-dn">أرب</div><div class="cal-dn">خمي</div><div class="cal-dn">جمع</div><div class="cal-dn">سبت</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <span><span class="leg-dot" style="background:rgba(5,173,152,.3)"></span>ممتاز ≥80%</span>
          <span><span class="leg-dot" style="background:rgba(245,181,68,.4)"></span>جيد 50-79%</span>
          <span><span class="leg-dot" style="background:rgba(236,77,37,.3)"></span>ضعيف &lt;50%</span>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-ic">☰</span><span>المزيد</span></div>
  <div class="nav-item"><span class="nav-ic">📊</span><span>التحليلات</span></div>
  <div class="nav-item"><span class="nav-ic">🔄</span><span>العادات</span></div>
  <div class="nav-item"><span class="nav-ic">🎯</span><span>الأهداف</span></div>
  <div class="nav-item active"><span class="nav-ic">🏠</span><span>الرئيسية</span></div>
</div>

<script>
const JN=['الم','سيقول','تلك الرسل','لن تنالوا','والمحصنات','لا يحب','وإذا سمعوا','ولو أننا','قال الملأ','واعلموا','يعتذرون','وما من دابة','وما أبرئ','ربما','سبحان','قال ألم','اقترب','قد أفلح','وقال الذين','أمّن خلق','اتل ما','ومن يقنت','وما لي','فمن أظلم','إليه يرد','حم','قال فما','قد سمع','تبارك','عمّ'];
let quranState = {1:'read',2:'read',3:'read',4:'read',5:'read',6:'mem',7:'mem'}; // demo

function switchTab(tab){
  document.getElementById('tabQuran').classList.toggle('active', tab==='quran');
  document.getElementById('tabCal').classList.toggle('active', tab==='cal');
  document.getElementById('tabCal').classList.toggle('cal-active', tab==='cal');
  document.getElementById('sec-quran').classList.toggle('active', tab==='quran');
  document.getElementById('sec-cal').classList.toggle('active', tab==='cal');
}

function renderJuz(){
  const grid = document.getElementById('juzGrid');
  grid.innerHTML='';
  let read=0, mem=0;
  for(let j=1;j<=30;j++){
    const st = quranState[j];
    if(st==='read') read++;
    if(st==='mem') mem++;
    const cell = document.createElement('div');
    cell.className = 'juz-cell' + (st==='read'?' read':st==='mem'?' mem':'');
    cell.innerHTML = `<div class="juz-num">${j}</div><div class="juz-name">${JN[j-1]}</div>`;
    cell.onclick = ()=>toggleJuz(j);
    grid.appendChild(cell);
  }
  document.getElementById('qReadNum').textContent = read+mem;
  document.getElementById('qMemNum').textContent = mem;
  document.getElementById('qPctNum').textContent = Math.round((read+mem)/30*100)+'%';
}

function toggleJuz(j){
  const cur = quranState[j];
  if(!cur){ quranState[j]='read'; showToast('📖 جزء '+j+' مقروء! +20 XP'); }
  else if(cur==='read'){ quranState[j]='mem'; confetti(); showToast('⭐ جزء '+j+' محفوظ! +50 XP'); }
  else { delete quranState[j]; }
  renderJuz();
}

function saveQTime(){
  const min = parseInt(document.getElementById('qMinInput').value)||0;
  if(!min){ showToast('⚠️ أدخل عدد الدقائق'); return; }
  const cur = parseInt(document.getElementById('qWeekTotal').textContent)||0;
  document.getElementById('qWeekTotal').textContent = cur+min;
  document.getElementById('qMinInput').value='';
  showToast('📖 '+min+' دقيقة تلاوة! +10 XP');
}

// ══ CALENDAR ══
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
let calY = new Date().getFullYear(), calM = new Date().getMonth();
// demo data: day -> percentage
const demoMonthData = {3:90,4:65,5:40,7:85,8:70,10:95,11:30,13:60,14:88,15:45,17:75,18:92,20:55,21:80};

function changeMonth(d){
  calM += d;
  if(calM>11){calM=0;calY++;}
  if(calM<0){calM=11;calY--;}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('calTitle').textContent = MONTHS[calM]+' '+calY;
  const firstDay = new Date(calY,calM,1).getDay();
  const daysInMonth = new Date(calY,calM+1,0).getDate();
  const today = new Date();
  const grid = document.getElementById('calGrid');
  grid.innerHTML='';
  for(let i=0;i<firstDay;i++){
    const e = document.createElement('div');
    e.className='cal-day empty';
    grid.appendChild(e);
  }
  for(let d=1;d<=daysInMonth;d++){
    const pct = demoMonthData[d];
    const isToday = today.getDate()===d && today.getMonth()===calM && today.getFullYear()===calY;
    let cls = 'cal-day';
    if(isToday) cls+=' today';
    if(pct!==undefined) cls += pct>=80?' green':pct>=50?' yellow':' red';
    const cell = document.createElement('div');
    cell.className = cls;
    cell.innerHTML = d + (pct!==undefined?`<div class="cal-pct">${pct}%</div>`:'');
    grid.appendChild(cell);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2300);
}
function confetti(){
  const cols = ['#F5B544','#EC4D25','#05AD98','#2BCFCE'];
  for(let i=0;i<28;i++){
    const el = document.createElement('div');
    el.className='cf';
    el.style.cssText = `left:${Math.random()*100}vw; top:-10px; background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${1.4+Math.random()*1.6}s; animation-delay:${Math.random()*.3}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderJuz();
  renderCalendar();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المزاج - مفكرة النجاح</title>
<style>
:root{
  --primary:#05AD98; --primary-light:#2BCFCE; --deep:#245F73;
  --accent:#EC4D25; --gray:#878787; --gray-light:#BBBFBF;
  --bg:#FAFAFA; --white:#FFFFFF; --text:#1A2E2C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Alyamama','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-font-smoothing:antialiased;}
.amiri{font-family:'Amiri','Segoe UI',serif;}
.screen{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary);cursor:pointer;flex-shrink:0;}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--deep);flex:1;}
.topbar-icon{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;}

.section-block{margin:14px 18px 22px;}
.section-head{font-size:.92rem; font-weight:800; color:var(--deep); margin-bottom:12px; display:flex; align-items:center; gap:6px;}

/* ══ MOOD CARD ══ */
.mood-card{background:#fff; border-radius:24px; padding:20px; box-shadow:0 4px 20px rgba(5,173,152,.07);}
.mood-prompt{font-size:.88rem; font-weight:700; color:var(--text); margin-bottom:16px; text-align:center;}
.mood-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px;}
.mood-opt{
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:12px 4px; border-radius:16px; cursor:pointer;
  background:rgba(5,173,152,.03); border:2px solid transparent;
  transition:all .2s;
}
.mood-opt .me{font-size:1.6rem; transition:transform .2s;}
.mood-opt .ml{font-size:.62rem; font-weight:700; color:var(--gray);}
.mood-opt.sel{background:rgba(5,173,152,.10); border-color:var(--primary); transform:scale(1.05);}
.mood-opt.sel .me{transform:scale(1.2);}
.mood-opt.sel .ml{color:var(--primary);}

.energy-label{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.energy-label span:first-child{font-size:.82rem; font-weight:700; color:var(--text);}
.energy-val-badge{
  font-size:1.1rem; font-weight:800; color:#fff;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.energy-cells{display:flex; gap:5px; margin-bottom:8px;}
.energy-cell{flex:1; height:30px; border-radius:8px; background:rgba(5,173,152,.08); cursor:pointer; transition:all .2s;}
.energy-cell.on{background:linear-gradient(150deg,var(--primary-light),var(--primary));}
.energy-scale{display:flex; justify-content:space-between; font-size:.65rem; color:var(--gray-light); font-weight:700;}

.save-mood-btn{
  width:100%; margin-top:18px; padding:13px; border-radius:16px; border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff;
  font-weight:800; font-size:.88rem; cursor:pointer; font-family:inherit;
  box-shadow:0 6px 18px rgba(5,173,152,.3); transition:transform .2s;
}
.save-mood-btn:active{transform:scale(.97);}

/* ══ PRIDE MOMENT CARD ══ */
.pride-card{
  border-radius:24px; padding:22px; position:relative; overflow:hidden;
  background:linear-gradient(150deg, #245F73 0%, #1a4757 70%, #122f3b 100%);
  color:#fff; box-shadow:0 10px 28px rgba(36,95,115,.3);
}
.pride-card::before{content:'';position:absolute;top:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);}
.pride-icon{font-size:1.7rem; position:relative; z-index:2;}
.pride-q{font-size:.96rem; font-weight:800; margin-top:8px; line-height:1.6; position:relative; z-index:2;}
.pride-input{
  width:100%; margin-top:14px; border:none; border-radius:14px; padding:13px 16px;
  font-family:inherit; font-size:.86rem; background:rgba(255,255,255,.12); color:#fff;
  outline:none; resize:none; position:relative; z-index:2;
  border:1px solid rgba(255,255,255,.2);
}
.pride-input::placeholder{color:rgba(255,255,255,.5);}
.pride-save{
  margin-top:12px; width:100%; padding:12px; border-radius:14px; border:none;
  background:rgba(255,255,255,.95); color:var(--deep); font-weight:800; font-size:.84rem;
  cursor:pointer; font-family:inherit; position:relative; z-index:2;
}

/* ══ PRIDE ARCHIVE ══ */
.archive-toggle{
  margin-top:14px; text-align:center; font-size:.78rem; color:rgba(255,255,255,.75);
  cursor:pointer; position:relative; z-index:2; font-weight:700;
}
.archive-list{display:none; margin-top:12px; position:relative; z-index:2;}
.archive-list.show{display:block; animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.archive-item{
  background:rgba(255,255,255,.10); border-radius:12px; padding:10px 14px; margin-bottom:8px;
  font-size:.78rem; line-height:1.6;
}
.archive-date{font-size:.65rem; color:rgba(255,255,255,.55); margin-top:4px;}

/* ══ MOOD HISTORY ══ */
.hist-card{background:#fff; border-radius:20px; padding:16px 18px; box-shadow:0 4px 18px rgba(5,173,152,.06);}
.hist-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(0,0,0,.04);}
.hist-row:last-child{border-bottom:none;}
.hist-day{font-size:.8rem; color:var(--gray); font-weight:700;}
.hist-data{display:flex; align-items:center; gap:10px;}
.hist-emoji{font-size:1.1rem;}
.hist-energy{font-size:.76rem; font-weight:800; color:var(--primary); background:rgba(5,173,152,.08); padding:2px 9px; border-radius:10px;}
.hist-empty{font-size:.76rem; color:var(--gray-light);}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:#fff;padding:11px 22px;border-radius:14px;font-size:.84rem;font-weight:700;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.18);max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cf{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(5,173,152,.10);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(5,173,152,.08);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;flex:1;}
.nav-item.active{color:var(--primary);}
.nav-item .nav-ic{font-size:1.25rem;}
.nav-item span:last-child{font-size:.66rem;font-weight:700;}
.nav-item.active .nav-ic{background:rgba(5,173,152,.10);border-radius:12px;padding:2px 10px;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="screen">

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="topbar-title">المزاج والفخر اليومي</div>
    <div class="topbar-icon">⋯</div>
  </div>

  <!-- MOOD -->
  <div class="section-block">
    <div class="section-head">😊 كيف حالك اليوم؟</div>
    <div class="mood-card">
      <div class="mood-prompt">اختر ما يصف مزاجك الآن</div>
      <div class="mood-grid" id="moodGrid"></div>

      <div class="energy-label">
        <span>⚡ مستوى الطاقة</span>
        <div class="energy-val-badge" id="energyVal">5</div>
      </div>
      <div class="energy-cells" id="energyCells"></div>
      <div class="energy-scale"><span>منخفضة</span><span>عالية</span></div>

      <button class="save-mood-btn" onclick="saveMood()">💾 حفظ مزاج اليوم</button>
    </div>
  </div>

  <!-- PRIDE MOMENT -->
  <div class="section-block">
    <div class="section-head">✨ لحظة الفخر اليومية</div>
    <div class="pride-card">
      <div class="pride-icon">🌟</div>
      <div class="pride-q amiri">ما أفضل قرار اتخذته اليوم؟</div>
      <textarea class="pride-input" id="prideInput" rows="2" placeholder="اكتب لحظة تفخر بها اليوم..."></textarea>
      <button class="pride-save" onclick="savePride()">📌 إضافة للأرشيف</button>
      <div class="archive-toggle" onclick="toggleArchive()">📂 عرض أرشيف لحظات الفخر (<span id="archiveCount">3</span>)</div>
      <div class="archive-list" id="archiveList"></div>
    </div>
  </div>

  <!-- MOOD HISTORY -->
  <div class="section-block" style="margin-bottom:30px;">
    <div class="section-head">📈 سجل آخر 7 أيام</div>
    <div class="hist-card" id="histCard"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-ic">☰</span><span>المزيد</span></div>
  <div class="nav-item"><span class="nav-ic">📊</span><span>التحليلات</span></div>
  <div class="nav-item"><span class="nav-ic">🔄</span><span>العادات</span></div>
  <div class="nav-item"><span class="nav-ic">🎯</span><span>الأهداف</span></div>
  <div class="nav-item active"><span class="nav-ic">🏠</span><span>الرئيسية</span></div>
</div>

<script>
const MOODS = [
  {e:'😄', l:'سعيد جداً'}, {e:'😊', l:'سعيد'}, {e:'😐', l:'عادي'}, {e:'😔', l:'حزين'},
  {e:'😤', l:'متوتر'}, {e:'🤩', l:'متحمس'}, {e:'😴', l:'متعب'}, {e:'💪', l:'قوي'},
];
let selectedMoodIdx = null;
let energyLevel = 5;

let prideArchive = [
  {text:'ساعدت زميلي في العمل بدون أن يطلب', date:'منذ 3 أيام'},
  {text:'صليت الفجر في وقته رغم التعب', date:'منذ 5 أيام'},
  {text:'اتصلت بوالدتي وسألت عن صحتها', date:'منذ يومين'},
];

// demo history
const histDemo = [
  {day:'اليوم', e:null, energy:null},
  {day:'أمس', e:'😊', energy:7},
  {day:'منذ يومين', e:'💪', energy:8},
  {day:'منذ 3 أيام', e:'😐', energy:5},
  {day:'منذ 4 أيام', e:'🤩', energy:9},
  {day:'منذ 5 أيام', e:'😴', energy:4},
  {day:'منذ 6 أيام', e:'😊', energy:6},
];

function renderMoodGrid(){
  const g = document.getElementById('moodGrid');
  g.innerHTML = MOODS.map((m,i)=>`
    <div class="mood-opt ${selectedMoodIdx===i?'sel':''}" onclick="selectMood(${i})">
      <span class="me">${m.e}</span>
      <span class="ml">${m.l}</span>
    </div>`).join('');
}
function selectMood(i){ selectedMoodIdx=i; renderMoodGrid(); }

function renderEnergyCells(){
  const c = document.getElementById('energyCells');
  c.innerHTML='';
  for(let i=1;i<=10;i++){
    const cell = document.createElement('div');
    cell.className = 'energy-cell'+(i<=energyLevel?' on':'');
    cell.onclick = ()=>{ energyLevel=i; renderEnergyCells(); document.getElementById('energyVal').textContent=i; };
    c.appendChild(cell);
  }
}

function saveMood(){
  if(selectedMoodIdx===null){ showToast('⚠️ اختر مزاجك أولاً'); return; }
  confetti();
  showToast('😊 تم حفظ مزاجك بنجاح! +5 XP');
}

function savePride(){
  const input = document.getElementById('prideInput');
  const text = input.value.trim();
  if(!text){ showToast('⚠️ اكتب لحظة فخرك أولاً'); return; }
  prideArchive.unshift({text, date:'الآن'});
  input.value='';
  document.getElementById('archiveCount').textContent = prideArchive.length;
  renderArchive();
  confetti();
  showToast('🌟 أُضيفت للأرشيف! +5 XP');
}

function toggleArchive(){
  const list = document.getElementById('archiveList');
  list.classList.toggle('show');
  if(list.classList.contains('show')) renderArchive();
}

function renderArchive(){
  const list = document.getElementById('archiveList');
  list.innerHTML = prideArchive.map(p=>`
    <div class="archive-item">
      ${p.text}
      <div class="archive-date">📅 ${p.date}</div>
    </div>`).join('');
}

function renderHistory(){
  const wrap = document.getElementById('histCard');
  wrap.innerHTML = histDemo.map(h=>`
    <div class="hist-row">
      <span class="hist-day">${h.day}</span>
      ${h.e ? `<div class="hist-data"><span class="hist-emoji">${h.e}</span><span class="hist-energy">⚡ ${h.energy}/10</span></div>`
            : '<span class="hist-empty">لم يُسجّل بعد</span>'}
    </div>`).join('');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2200);
}

function confetti(){
  const cols = ['#05AD98','#2BCFCE','#245F73','#EC4D25','#F5B544'];
  for(let i=0;i<24;i++){
    const el = document.createElement('div');
    el.className='cf';
    el.style.cssText = `left:${Math.random()*100}vw; top:-10px; background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${1.4+Math.random()*1.6}s; animation-delay:${Math.random()*.3}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderMoodGrid();
  renderEnergyCells();
  renderHistory();
});
</script>
</body>
</html>

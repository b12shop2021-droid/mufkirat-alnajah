<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلتي - مفكرة النجاح</title>
<style>
:root{
  --primary:#05AD98; --primary-light:#2BCFCE; --deep:#245F73;
  --accent:#EC4D25; --gray:#878787; --gray-light:#BBBFBF;
  --bg:#FAFAFA; --white:#FFFFFF; --text:#1A2E2C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Alyamama','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-font-smoothing:antialiased;}
.amiri{font-family:'Amiri','Segoe UI',serif;}
.screen{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary);cursor:pointer;flex-shrink:0;}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--deep);flex:1;}
.topbar-icon{width:38px;height:38px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;}

.tabs-wrap{display:flex;gap:6px;margin:10px 18px 18px;background:#fff;border-radius:16px;padding:5px;box-shadow:0 2px 10px rgba(5,173,152,.06);}
.tab-btn{flex:1;text-align:center;padding:9px 0;border-radius:11px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:700;color:var(--gray);transition:all .25s;}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(5,173,152,.3);}

.section{display:none;}
.section.active{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-block{margin:0 18px 20px;}
.section-head{font-size:.9rem;font-weight:800;color:var(--deep);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ══ MONTHLY WRAP (قصة النجاح) ══ */
.wrap-card{
  border-radius:28px;padding:30px 24px;position:relative;overflow:hidden;color:#fff;
  background:linear-gradient(160deg,#06b9a3 0%,#0a8f80 35%,#245F73 75%,#1a3a52 100%);
  box-shadow:0 16px 36px rgba(5,173,152,.3);text-align:center;
}
.wrap-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 0%, rgba(255,255,255,.2), transparent 50%),
             radial-gradient(circle at 90% 100%, rgba(255,255,255,.12), transparent 45%);
}
.wrap-month{font-size:.8rem;opacity:.8;position:relative;z-index:2;font-weight:700;}
.wrap-title{font-size:1.3rem;font-weight:800;margin-top:4px;position:relative;z-index:2;}
.wrap-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;position:relative;z-index:2;}
.wrap-stat{background:rgba(255,255,255,.14);border-radius:16px;padding:14px 8px;border:1px solid rgba(255,255,255,.2);}
.wrap-stat-num{font-size:1.5rem;font-weight:800;}
.wrap-stat-label{font-size:.68rem;opacity:.85;margin-top:2px;}
.wrap-highlight{
  margin-top:18px;padding:14px;background:rgba(255,255,255,.92);border-radius:14px;color:var(--deep);
  font-size:.82rem;font-weight:800;position:relative;z-index:2;line-height:1.6;
}
.wrap-share-btn{
  width:100%;margin-top:16px;padding:12px;border-radius:14px;border:none;
  background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.35);
  font-weight:800;font-size:.82rem;cursor:pointer;font-family:inherit;position:relative;z-index:2;
}

/* ══ ROAD MAP (محطات الطريق) ══ */
.roadmap-card{background:#fff;border-radius:24px;padding:24px 20px;box-shadow:0 4px 20px rgba(5,173,152,.07);}
.road-path{position:relative;padding-right:30px;}
.road-line{position:absolute;right:14px;top:8px;bottom:8px;width:3px;background:rgba(5,173,152,.15);border-radius:3px;}
.road-line-fill{position:absolute;right:14px;top:8px;width:3px;background:linear-gradient(to bottom,var(--primary),var(--primary-light));border-radius:3px;transition:height .6s ease;}
.station{position:relative;padding-bottom:28px;}
.station:last-child{padding-bottom:0;}
.station-dot{
  position:absolute;right:0;top:0;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.95rem;z-index:2;
  background:rgba(5,173,152,.08);border:2px solid rgba(5,173,152,.2);
}
.station-dot.reached{background:linear-gradient(150deg,var(--primary-light),var(--primary));border-color:transparent;color:#fff;}
.station-dot.current{background:linear-gradient(150deg,#F5B544,var(--accent));border-color:transparent;color:#fff;box-shadow:0 0 0 4px rgba(236,77,37,.15);}
.station-content{margin-right:42px;}
.station-title{font-size:.84rem;font-weight:800;color:var(--text);}
.station-title.reached-text{color:var(--primary);}
.station-sub{font-size:.7rem;color:var(--gray);margin-top:2px;}
.station-badge{font-size:.62rem;font-weight:800;color:var(--accent);background:rgba(236,77,37,.08);padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px;}

/* ══ ACHIEVEMENTS GALLERY ══ */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.gallery-item{
  border-radius:20px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(5,173,152,.08);
}
.gallery-item.earned{background:linear-gradient(155deg,#fff,rgba(236,77,37,.04));border:1.5px solid rgba(236,77,37,.18);}
.gallery-item.locked{background:#fff;opacity:.5;}
.gallery-emoji{font-size:2rem;}
.gallery-title{font-size:.76rem;font-weight:800;color:var(--deep);margin-top:8px;}
.gallery-date{font-size:.62rem;color:var(--gray);margin-top:3px;}
.gallery-shine{
  position:absolute;top:-20px;left:-20px;width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle,rgba(236,77,37,.15),transparent 70%);
}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:#fff;padding:11px 22px;border-radius:14px;font-size:.84rem;font-weight:700;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.18);max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cf{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(5,173,152,.10);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(5,173,152,.08);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;flex:1;}
.nav-item.active{color:var(--primary);}
.nav-item .nav-ic{font-size:1.25rem;}
.nav-item span:last-child{font-size:.66rem;font-weight:700;}
.nav-item.active .nav-ic{background:rgba(5,173,152,.10);border-radius:12px;padding:2px 10px;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="screen">

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="topbar-title">رحلتي ومعرض إنجازاتي</div>
    <div class="topbar-icon">⋯</div>
  </div>

  <div class="tabs-wrap">
    <button class="tab-btn active" id="tabWrap" onclick="switchTab('wrap')">🎬 قصة الشهر</button>
    <button class="tab-btn" id="tabRoad" onclick="switchTab('road')">🛣️ محطات الطريق</button>
    <button class="tab-btn" id="tabGallery" onclick="switchTab('gallery')">🖼️ معرضي</button>
  </div>

  <!-- MONTHLY WRAP -->
  <div class="section active" id="sec-wrap">
    <div class="section-block" style="margin-top:10px;">
      <div class="wrap-card">
        <div class="wrap-month">يونيو 2026</div>
        <div class="wrap-title">شهرك بالأرقام ✨</div>
        <div class="wrap-stats-grid">
          <div class="wrap-stat"><div class="wrap-stat-num">22</div><div class="wrap-stat-label">يوم منضبط</div></div>
          <div class="wrap-stat"><div class="wrap-stat-num">340</div><div class="wrap-stat-label">نقطة XP</div></div>
          <div class="wrap-stat"><div class="wrap-stat-num">7</div><div class="wrap-stat-label">أجزاء قرآن</div></div>
          <div class="wrap-stat"><div class="wrap-stat-num">3</div><div class="wrap-stat-label">ألقاب جديدة</div></div>
        </div>
        <div class="wrap-highlight">🏆 أقوى أسبوع لك كان الأسبوع الثالث بإنجاز 91%!</div>
        <button class="wrap-share-btn" onclick="shareWrap()">📤 مشاركة ملخص الشهر</button>
      </div>
    </div>
  </div>

  <!-- ROAD MAP -->
  <div class="section" id="sec-road">
    <div class="section-block" style="margin-top:10px;">
      <div class="roadmap-card">
        <div class="road-path">
          <div class="road-line"></div>
          <div class="road-line-fill" id="roadFill"></div>
          <div id="stationsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="section" id="sec-gallery">
    <div class="section-block" style="margin-top:10px;">
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-ic">☰</span><span>المزيد</span></div>
  <div class="nav-item"><span class="nav-ic">📊</span><span>التحليلات</span></div>
  <div class="nav-item"><span class="nav-ic">🔄</span><span>العادات</span></div>
  <div class="nav-item"><span class="nav-ic">🎯</span><span>الأهداف</span></div>
  <div class="nav-item active"><span class="nav-ic">🏠</span><span>الرئيسية</span></div>
</div>

<script>
function switchTab(tab){
  ['wrap','road','gallery'].forEach(t=>{
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    document.getElementById('sec-'+t).classList.toggle('active', t===tab);
  });
}

// ══ ROAD MAP ══
const stations = [
  {days:7, title:'المحطة الأولى', sub:'أسبوع كامل من الانضباط', reached:true},
  {days:30, title:'المحطة الثانية', sub:'شهر كامل — عادة تكوّنت', reached:true},
  {days:100, title:'محطة الأبطال', sub:'100 يوم — إنجاز استثنائي', reached:false, current:true},
  {days:365, title:'المحطة الكبرى', sub:'سنة كاملة من النجاح', reached:false},
];
const currentDays = 47; // demo

function renderStations(){
  const wrap = document.getElementById('stationsList');
  wrap.innerHTML = stations.map(s=>{
    const isCurrent = !s.reached && currentDays < s.days && (stations.find(x=>!x.reached)===s);
    const cls = s.reached ? 'reached' : (isCurrent ? 'current' : '');
    return `
    <div class="station">
      <div class="station-dot ${cls}">${s.reached?'✓':isCurrent?'🚩':s.days}</div>
      <div class="station-content">
        <div class="station-title ${s.reached?'reached-text':''}">${s.title} (${s.days} يوم)</div>
        <div class="station-sub">${s.sub}</div>
        ${isCurrent ? `<div class="station-badge">باقي ${s.days-currentDays} يوم</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const reachedCount = stations.filter(s=>s.reached).length;
  const fillPct = (reachedCount/(stations.length-1))*100;
  document.getElementById('roadFill').style.height = Math.min(100,fillPct)+'%';
}

// ══ GALLERY ══
const achievements = [
  {emoji:'🔥', title:'أول سلسلة 7 أيام', date:'15 مايو 2026', earned:true},
  {emoji:'📖', title:'أول ختمة جزء', date:'2 يونيو 2026', earned:true},
  {emoji:'🎯', title:'صانع القرار', date:'10 يونيو 2026', earned:true},
  {emoji:'🏆', title:'بطل النجاح', date:'يحتاج 1800 XP', earned:false},
  {emoji:'👑', title:'90 يوم عهد', date:'يحتاج إكمال العهد', earned:false},
  {emoji:'🌳', title:'شجرة مزهرة', date:'يحتاج 90 يوم سلسلة', earned:false},
];

function renderGallery(){
  const wrap = document.getElementById('galleryGrid');
  wrap.innerHTML = achievements.map(a=>`
    <div class="gallery-item ${a.earned?'earned':'locked'}">
      ${a.earned?'<div class="gallery-shine"></div>':''}
      <div class="gallery-emoji">${a.emoji}</div>
      <div class="gallery-title">${a.title}</div>
      <div class="gallery-date">${a.earned?'📅 '+a.date:'🔒 '+a.date}</div>
    </div>`).join('');
}

function shareWrap(){
  confetti();
  showToast('📤 جاهز للمشاركة! (سيُحفظ كصورة قابلة للمشاركة)');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2400);
}
function confetti(){
  const cols = ['#05AD98','#2BCFCE','#245F73','#F5B544'];
  for(let i=0;i<28;i++){
    const el = document.createElement('div');
    el.className='cf';
    el.style.cssText = `left:${Math.random()*100}vw; top:-10px; background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${1.4+Math.random()*1.6}s; animation-delay:${Math.random()*.3}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderStations();
  renderGallery();
});
</script>
</body>
</html>

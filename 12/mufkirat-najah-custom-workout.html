<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صمّم جدول تمارينك - مفكرة النجاح</title>
<style>
:root{
  --primary:#05AD98; --primary-light:#2BCFCE; --deep:#245F73;
  --accent:#EC4D25; --gray:#878787; --gray-light:#BBBFBF;
  --bg:#FAFAFA; --white:#FFFFFF; --text:#1A2E2C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Alyamama','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-font-smoothing:antialiased;}
.amiri{font-family:'Amiri','Segoe UI',serif;}
.screen{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:10px;padding:16px 18px 10px;position:sticky;top:0;z-index:60;background:rgba(250,250,250,.94);backdrop-filter:blur(12px);}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(5,173,152,.08);display:flex;align-items:center;justify-content:center;font-size:1.05rem;color:var(--primary);cursor:pointer;flex-shrink:0;}
.topbar-title{font-size:.98rem;font-weight:800;color:var(--deep);flex:1;}

/* ══ INTRO HERO ══ */
.intro-hero{
  margin:10px 18px 18px;border-radius:24px;padding:24px 22px;text-align:center;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(150deg,#245F73 0%,#1a4757 60%,#0a8f80 100%);box-shadow:0 14px 30px rgba(36,95,115,.28);
}
.intro-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 0%, rgba(255,255,255,.18), transparent 50%);}
.intro-icon{font-size:2.2rem;position:relative;z-index:2;}
.intro-title{font-size:1.05rem;font-weight:800;margin-top:8px;position:relative;z-index:2;}
.intro-sub{font-size:.8rem;opacity:.85;margin-top:6px;line-height:1.7;position:relative;z-index:2;}

/* ══ EMPTY STATE ══ */
.empty-state-wrap{margin:0 18px 18px;text-align:center;padding:40px 20px;border-radius:22px;background:#fff;box-shadow:0 4px 18px rgba(5,173,152,.07);}
.empty-state-wrap.hide{display:none;}
.empty-icon{font-size:2.4rem;}
.empty-text{font-size:.86rem;color:var(--gray);margin-top:10px;line-height:1.7;font-weight:600;}

/* ══ DAYS LIST ══ */
.days-section{margin:0 18px 16px;}
.day-card{background:#fff;border-radius:20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(5,173,152,.07);overflow:hidden;}
.day-card-head{
  display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;
  background:linear-gradient(135deg,rgba(5,173,152,.06),rgba(43,207,206,.03));
}
.day-card-head.collapsed{border-radius:20px;}
.day-name-input{
  flex:1;border:none;background:none;font-family:inherit;font-size:.92rem;font-weight:800;color:var(--deep);outline:none;
}
.day-toggle-arrow{color:var(--primary);font-size:.85rem;transition:transform .25s;flex-shrink:0;}
.day-toggle-arrow.open{transform:rotate(90deg);}
.day-del-btn{background:none;border:none;color:var(--gray-light);font-size:.9rem;cursor:pointer;flex-shrink:0;padding:4px;}
.day-del-btn:hover{color:var(--accent);}
.day-ex-count{font-size:.68rem;color:var(--primary);background:rgba(5,173,152,.1);padding:3px 9px;border-radius:10px;font-weight:800;flex-shrink:0;}

.day-card-body{display:none;padding:14px 16px 16px;}
.day-card-body.open{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══ EXERCISE ITEM (within custom day) ══ */
.cust-ex-item{background:rgba(5,173,152,.03);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid rgba(5,173,152,.1);}
.cust-ex-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cust-ex-name{flex:1;border:1.5px solid rgba(5,173,152,.15);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.84rem;outline:none;background:#fff;font-weight:700;color:var(--text);}
.cust-ex-name:focus{border-color:var(--primary);}
.cust-ex-del{background:none;border:none;color:var(--gray-light);cursor:pointer;font-size:.85rem;flex-shrink:0;}
.cust-ex-del:hover{color:var(--accent);}

.cust-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.cust-ex-field{display:flex;flex-direction:column;gap:4px;}
.cust-ex-field label{font-size:.66rem;color:var(--gray);font-weight:700;}
.cust-ex-field input, .cust-ex-field select{
  border:1.5px solid rgba(5,173,152,.13);border-radius:9px;padding:7px 10px;font-family:inherit;font-size:.78rem;outline:none;background:#fff;
}
.cust-ex-field input:focus, .cust-ex-field select:focus{border-color:var(--primary);}

.cust-ex-notes{
  width:100%;border:1.5px solid rgba(5,173,152,.13);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:.78rem;outline:none;resize:none;margin-top:4px;
}
.cust-ex-notes:focus{border-color:var(--primary);}

.add-ex-btn{
  width:100%;padding:11px;border-radius:12px;border:1.5px dashed rgba(5,173,152,.3);background:rgba(5,173,152,.03);
  color:var(--primary);font-weight:800;font-size:.8rem;cursor:pointer;font-family:inherit;
}

.day-img-slot{
  aspect-ratio:1/1;max-width:120px;border-radius:14px;border:2px dashed rgba(5,173,152,.22);background:rgba(5,173,152,.02);
  display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:10px;overflow:hidden;
}
.day-img-slot img{width:100%;height:100%;object-fit:cover;}

/* ══ ADD DAY BUTTON ══ */
.add-day-btn{
  width:calc(100% - 36px);margin:0 18px 18px;padding:15px;border-radius:18px;
  border:2px dashed rgba(36,95,115,.3);background:rgba(36,95,115,.03);
  color:var(--deep);font-weight:800;font-size:.88rem;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
}

/* ══ SAVE PLAN BAR ══ */
.save-plan-bar{margin:0 18px 30px;}
.save-plan-btn{
  width:100%;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;
  font-weight:800;font-size:.9rem;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(5,173,152,.3);
}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:#fff;padding:11px 22px;border-radius:14px;font-size:.84rem;font-weight:700;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.18);max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cf{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(5,173,152,.10);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(5,173,152,.08);z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;flex:1;}
.nav-item.active{color:var(--primary);}
.nav-item .nav-ic{font-size:1.25rem;}
.nav-item span:last-child{font-size:.66rem;font-weight:700;}
.nav-item.active .nav-ic{background:rgba(5,173,152,.10);border-radius:12px;padding:2px 10px;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="screen">

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="topbar-title">🛠️ صمّم جدول تمارينك</div>
  </div>

  <div class="intro-hero">
    <div class="intro-icon">🛠️</div>
    <div class="intro-title">برنامجك، بطريقتك الخاصة</div>
    <div class="intro-sub">صمّم عدد الأيام والتمارين التي تناسبك تماماً — بجانب برنامج "الكابتن سعود" الجاهز، لا بديلاً عنه.</div>
  </div>

  <div class="empty-state-wrap" id="emptyState">
    <div class="empty-icon">📋</div>
    <div class="empty-text">لم تُضف أي يوم تمرين بعد<br>اضغط "+ إضافة يوم جديد" بالأسفل لتبدأ تصميم برنامجك</div>
  </div>

  <div class="days-section" id="daysSection"></div>

  <button class="add-day-btn" onclick="addDay()">+ إضافة يوم تمرين جديد</button>

  <div class="save-plan-bar">
    <button class="save-plan-btn" onclick="savePlan()">تـم — حفظ برنامجي المخصّص</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-ic">☰</span><span>المزيد</span></div>
  <div class="nav-item"><span class="nav-ic">📊</span><span>التحليلات</span></div>
  <div class="nav-item active"><span class="nav-ic">🔄</span><span>العادات</span></div>
  <div class="nav-item"><span class="nav-ic">🎯</span><span>الأهداف</span></div>
  <div class="nav-item"><span class="nav-ic">🏠</span><span>الرئيسية</span></div>
</div>

<script>
let customDays = [];
let dayIdCounter = 1;
let exIdCounter = 1;
let openDayId = null;

function addDay(){
  const newDay = {
    id: dayIdCounter++,
    name: 'يوم تمرين ' + customDays.length,
    exercises: [],
    image: null
  };
  customDays.push(newDay);
  openDayId = newDay.id;
  renderDays();
  showToast('✅ تمت إضافة يوم جديد — أضف تمارينك له الآن');
}

function deleteDay(dayId){
  if(!confirm('حذف هذا اليوم بالكامل من برنامجك؟')) return;
  customDays = customDays.filter(d=>d.id!==dayId);
  renderDays();
  showToast('🗑 تم حذف اليوم');
}

function toggleDay(dayId){
  openDayId = (openDayId===dayId) ? null : dayId;
  renderDays();
}

function updateDayName(dayId, name){
  const day = customDays.find(d=>d.id===dayId);
  if(day) day.name = name;
}

function addExercise(dayId){
  const day = customDays.find(d=>d.id===dayId);
  day.exercises.push({
    id: exIdCounter++,
    name: '',
    sets: '',
    reps: '',
    difficulty: 'متوسط',
    notes: ''
  });
  renderDays();
}

function deleteExercise(dayId, exId){
  const day = customDays.find(d=>d.id===dayId);
  day.exercises = day.exercises.filter(e=>e.id!==exId);
  renderDays();
}

function updateExercise(dayId, exId, field, value){
  const day = customDays.find(d=>d.id===dayId);
  const ex = day.exercises.find(e=>e.id===exId);
  if(ex) ex[field] = value;
}

function handleDayImage(event, dayId){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const day = customDays.find(d=>d.id===dayId);
    day.image = e.target.result;
    renderDays();
  };
  reader.readAsDataURL(file);
}

function renderDays(){
  document.getElementById('emptyState').classList.toggle('hide', customDays.length>0);
  const wrap = document.getElementById('daysSection');

  wrap.innerHTML = customDays.map(day=>{
    const isOpen = openDayId===day.id;
    return `
    <div class="day-card">
      <div class="day-card-head ${isOpen?'':'collapsed'}">
        <span class="day-toggle-arrow ${isOpen?'open':''}" onclick="toggleDay(${day.id})">›</span>
        <input type="text" class="day-name-input" value="${day.name}"
               onchange="updateDayName(${day.id}, this.value)" placeholder="اسم اليوم (مثال: يوم الصدر والترايسبس)">
        <span class="day-ex-count">${day.exercises.length} تمرين</span>
        <button class="day-del-btn" onclick="deleteDay(${day.id})">🗑</button>
      </div>
      <div class="day-card-body ${isOpen?'open':''}">

        ${day.image ? `<div class="day-img-slot"><img src="${day.image}" alt=""></div>` : ''}

        ${day.exercises.map(ex=>`
          <div class="cust-ex-item">
            <div class="cust-ex-top">
              <input type="text" class="cust-ex-name" placeholder="🏋️ اسم التمرين (مثال: ضغط صدر بالبار)"
                     value="${ex.name}" onchange="updateExercise(${day.id},${ex.id},'name',this.value)">
              <button class="cust-ex-del" onclick="deleteExercise(${day.id},${ex.id})">🗑</button>
            </div>
            <div class="cust-ex-grid">
              <div class="cust-ex-field">
                <label>عدد الجولات</label>
                <input type="number" placeholder="مثال: 4" value="${ex.sets}" onchange="updateExercise(${day.id},${ex.id},'sets',this.value)">
              </div>
              <div class="cust-ex-field">
                <label>التكرارات</label>
                <input type="text" placeholder="مثال: 8-12" value="${ex.reps}" onchange="updateExercise(${day.id},${ex.id},'reps',this.value)">
              </div>
            </div>
            <div class="cust-ex-field">
              <label>مستوى الصعوبة</label>
              <select onchange="updateExercise(${day.id},${ex.id},'difficulty',this.value)">
                <option value="سهل" ${ex.difficulty==='سهل'?'selected':''}>سهل</option>
                <option value="متوسط" ${ex.difficulty==='متوسط'?'selected':''}>متوسط</option>
                <option value="متقدم" ${ex.difficulty==='متقدم'?'selected':''}>متقدم</option>
              </select>
            </div>
            <textarea class="cust-ex-notes" rows="2" placeholder="ملاحظاتك الخاصة على التمرين (اختياري)"
                      onchange="updateExercise(${day.id},${ex.id},'notes',this.value)">${ex.notes}</textarea>
          </div>`).join('')}

        <button class="add-ex-btn" onclick="addExercise(${day.id})">+ إضافة تمرين لهذا اليوم</button>

        <label style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:.72rem;color:var(--gray);cursor:pointer;">
          📷 إضافة صورة لهذا اليوم
          <input type="file" accept="image/*" style="display:none;" onchange="handleDayImage(event, ${day.id})">
        </label>
      </div>
    </div>`;
  }).join('');
}

function savePlan(){
  if(!customDays.length){ showToast('⚠️ أضف يوم تمرين واحد على الأقل أولاً'); return; }
  const emptyNames = customDays.some(d => d.exercises.some(e => !e.name.trim()));
  if(emptyNames){ showToast('⚠️ تأكد من كتابة اسم كل تمرين قبل الحفظ'); return; }

  // محاكاة الحفظ — عند الدمج الفعلي تُستبدل بحفظ حقيقي في قاعدة بيانات Manus
  console.log('✅ برنامج مخصص محفوظ:', customDays);
  confetti();
  showToast('🛠️ تـم حفظ برنامجك المخصّص بنجاح!');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2500);
}

function confetti(){
  const cols = ['#05AD98','#2BCFCE','#245F73','#F5B544'];
  for(let i=0;i<24;i++){
    const el = document.createElement('div');
    el.className='cf';
    el.style.cssText = `left:${Math.random()*100}vw; top:-10px; background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${1.4+Math.random()*1.6}s; animation-delay:${Math.random()*.3}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

window.addEventListener('DOMContentLoaded', renderDays);
</script>
</body>
</html>
